<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Popup Modal Test</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        button { padding: 8px 16px; cursor: pointer; }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
        }
        .modal {
            background: #fff; padding: 24px; border-radius: 8px;
            min-width: 300px; text-align: center;
        }
        .modal h2 { margin-top: 0; }
    </style>
</head>
<body>
    <h1>Popup Modal Test</h1>
    <button id="show-popup" onclick="showModal()">Show Popup</button>

    <div id="modal-overlay" class="overlay" style="display:none">
        <div class="modal">
            <h2>알림</h2>
            <p>This is a modal popup for testing.</p>
            <button id="close-popup" onclick="hideModal()">닫기</button>
        </div>
    </div>

    <script>
        function showModal() {
            document.getElementById('modal-overlay').style.display = 'flex';
        }
        function hideModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }
    </script>
</body>
</html>
