# 필터/정렬 처리 규칙 — LLM-First v3 표준화
# Text/ARIA-based selectors only — no class-name dependencies

rules:
  # ── Sort by Price (Low to High) ────────────────────
  - name: "sort_price_low"
    category: "sort"
    trigger:
      intent: "낮은가격순 정렬"
      site_pattern: "*"
    selector: "option[value*='price_asc'], a:has-text('낮은가격순'), a:has-text('가격낮은순'), button:has-text('Price: Low'), option:has-text('낮은가격순'), [data-sort='price_asc']"
    method: "click"
    priority: 75

  # ── Sort by Price (High to Low) ────────────────────
  - name: "sort_price_high"
    category: "sort"
    trigger:
      intent: "높은가격순 정렬"
      site_pattern: "*"
    selector: "option[value*='price_desc'], a:has-text('높은가격순'), a:has-text('가격높은순'), button:has-text('Price: High'), option:has-text('높은가격순'), [data-sort='price_desc']"
    method: "click"
    priority: 75

  # ── Sort by Popularity ─────────────────────────────
  - name: "sort_popularity"
    category: "sort"
    trigger:
      intent: "인기순 정렬"
      site_pattern: "*"
    selector: "option[value*='popular'], a:has-text('인기순'), a:has-text('인기상품'), button:has-text('Popularity'), option:has-text('인기순'), [data-sort='popular']"
    method: "click"
    priority: 76

  # ── Sort by Latest ─────────────────────────────────
  - name: "sort_latest"
    category: "sort"
    trigger:
      intent: "최신순 정렬"
      site_pattern: "*"
    selector: "option[value*='latest'], a:has-text('최신순'), a:has-text('신상품순'), button:has-text('Newest'), option:has-text('최신순'), [data-sort='latest']"
    method: "click"
    priority: 75

  # ── Sort by Rating ─────────────────────────────────
  - name: "sort_rating"
    category: "sort"
    trigger:
      intent: "평점순 정렬"
      site_pattern: "*"
    selector: "option[value*='rating'], a:has-text('평점순'), a:has-text('별점순'), button:has-text('Rating'), option:has-text('평점순'), [data-sort='rating']"
    method: "click"
    priority: 75

  # ── Sort by Sales Volume ───────────────────────────
  - name: "sort_sales"
    category: "sort"
    trigger:
      intent: "판매순 정렬"
      site_pattern: "*"
    selector: "option[value*='sales'], a:has-text('판매순'), a:has-text('판매많은순'), button:has-text('Best Selling'), option:has-text('판매순'), [data-sort='sales']"
    method: "click"
    priority: 75

  # ── Sort by Review Count ───────────────────────────
  - name: "sort_review_count"
    category: "sort"
    trigger:
      intent: "리뷰순 정렬"
      site_pattern: "*"
    selector: "option[value*='review'], a:has-text('리뷰순'), a:has-text('리뷰많은순'), button:has-text('Most Reviews'), option:has-text('리뷰순'), [data-sort='review']"
    method: "click"
    priority: 74

  # ── Price Range Filter ─────────────────────────────
  - name: "filter_price_range"
    category: "filter"
    trigger:
      intent: "가격대 필터"
      site_pattern: "*"
    selector: "[data-filter='price'], input[name*='price_min'], input[name*='price_max'], label:has-text('가격'), label:has-text('Price')"
    method: "click"
    priority: 72

  # ── Category Filter ────────────────────────────────
  - name: "filter_category"
    category: "filter"
    trigger:
      intent: "카테고리 필터"
      site_pattern: "*"
    selector: "[data-filter='category'], nav[aria-label*='categor' i] a, nav[aria-label*='카테고리'] a, [role='navigation'] a"
    method: "click"
    priority: 73

  # ── Brand Filter ───────────────────────────────────
  - name: "filter_brand"
    category: "filter"
    trigger:
      intent: "브랜드 필터"
      site_pattern: "*"
    selector: "[data-filter='brand'], input[name*='brand'], label:has-text('브랜드'), label:has-text('Brand')"
    method: "click"
    priority: 72

  # ── Rating Filter ──────────────────────────────────
  - name: "filter_rating"
    category: "filter"
    trigger:
      intent: "평점 필터"
      site_pattern: "*"
    selector: "[data-filter='rating'], input[name*='rating'], label:has-text('평점'), label:has-text('Rating')"
    method: "click"
    priority: 71

  # ── Delivery Filter ────────────────────────────────
  - name: "filter_delivery"
    category: "filter"
    trigger:
      intent: "배송 필터"
      site_pattern: "*"
    selector: "[data-filter='delivery'], input[name*='delivery'], label:has-text('무료배송'), label:has-text('Free Shipping')"
    method: "click"
    priority: 71

  # ── Color Filter ───────────────────────────────────
  - name: "filter_color"
    category: "filter"
    trigger:
      intent: "색상 필터"
      site_pattern: "*"
    selector: "[data-filter='color'], input[name*='color'], label:has-text('색상'), label:has-text('Color')"
    method: "click"
    priority: 70

  # ── Size Filter ────────────────────────────────────
  - name: "filter_size"
    category: "filter"
    trigger:
      intent: "사이즈 필터"
      site_pattern: "*"
    selector: "[data-filter='size'], input[name*='size'], select[name*='size'], label:has-text('사이즈'), label:has-text('Size')"
    method: "click"
    priority: 70
