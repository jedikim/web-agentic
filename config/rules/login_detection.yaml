# 로그인/인증 감지 규칙 — Phase 5 Exception Hardening
# 12 rules for login, 2FA, OAuth, CAPTCHA, and auth-related patterns

rules:
  # ── Login Form Detection ───────────────────────────
  - name: "login_form_detect"
    category: "login"
    trigger:
      intent: "로그인 폼 감지"
      site_pattern: "*"
    selector: "form[action*='login'], form[action*='signin'], form[id*='login'], form[class*='login'], form[class*='signin'], #loginForm, .login-form, .signin-form"
    method: "detect"
    priority: 90

  - name: "login_username_field"
    category: "login"
    trigger:
      intent: "로그인 사용자명 입력"
      site_pattern: "*"
    selector: "input[name='username'], input[name='email'], input[name='user_id'], input[id*='login-email'], input[type='email'][autocomplete='username'], input[name='login'], input[id*='userId']"
    method: "type"
    priority: 88

  - name: "login_password_field"
    category: "login"
    trigger:
      intent: "로그인 비밀번호 입력"
      site_pattern: "*"
    selector: "input[type='password'], input[name='password'], input[name='passwd'], input[id*='password'], input[autocomplete='current-password']"
    method: "type"
    priority: 88

  # ── 2FA Prompt ─────────────────────────────────────
  - name: "login_2fa_prompt"
    category: "login"
    trigger:
      intent: "2단계 인증 감지"
      site_pattern: "*"
    selector: ".two-factor, .mfa-prompt, [class*='2fa'], [class*='two-step'], input[name='otp'], input[name='totp'], input[name='verification_code'], .two-step-verification, .mfa-challenge"
    method: "detect"
    priority: 95

  # ── OAuth Popup ────────────────────────────────────
  - name: "login_oauth_popup"
    category: "login"
    trigger:
      intent: "OAuth 로그인 팝업 감지"
      site_pattern: "*"
    selector: ".oauth-popup, .social-login, button[class*='google-login'], button[class*='facebook-login'], button[class*='kakao-login'], button[class*='naver-login'], .btn-oauth, .social-signin"
    method: "detect"
    priority: 85

  # ── Password Expired ───────────────────────────────
  - name: "login_password_expired"
    category: "login"
    trigger:
      intent: "비밀번호 만료 감지"
      site_pattern: "*"
    selector: ".password-expired, [class*='password-change'], h1:has-text('Password Expired'), h1:has-text('비밀번호 변경'), .force-password-change, .expired-password"
    method: "detect"
    priority: 93

  # ── Account Locked ─────────────────────────────────
  - name: "login_account_locked"
    category: "login"
    trigger:
      intent: "계정 잠금 감지"
      site_pattern: "*"
    selector: ".account-locked, [class*='account-lock'], h1:has-text('Account Locked'), h1:has-text('계정이 잠겼습니다'), .locked-account, .suspended-account"
    method: "detect"
    priority: 94

  # ── CAPTCHA Detection (generic) ────────────────────
  - name: "login_captcha_generic"
    category: "login"
    trigger:
      intent: "캡챠 감지"
      site_pattern: "*"
    selector: ".captcha, [class*='captcha'], [id*='captcha'], img[src*='captcha'], .g-recaptcha, .h-captcha, #captcha-container, [data-sitekey]"
    method: "detect"
    priority: 96

  # ── reCAPTCHA ──────────────────────────────────────
  - name: "login_recaptcha"
    category: "login"
    trigger:
      intent: "reCAPTCHA 감지"
      site_pattern: "*"
    selector: ".g-recaptcha, #recaptcha, [class*='recaptcha'], iframe[src*='recaptcha'], .recaptcha-checkbox, [data-sitekey]"
    method: "detect"
    priority: 97

  # ── hCaptcha ───────────────────────────────────────
  - name: "login_hcaptcha"
    category: "login"
    trigger:
      intent: "hCaptcha 감지"
      site_pattern: "*"
    selector: ".h-captcha, [class*='hcaptcha'], iframe[src*='hcaptcha'], #hcaptcha, [data-hcaptcha-sitekey]"
    method: "detect"
    priority: 97

  # ── Cloudflare Challenge ───────────────────────────
  - name: "login_cloudflare_challenge"
    category: "login"
    trigger:
      intent: "Cloudflare 보안 확인 감지"
      site_pattern: "*"
    selector: "#cf-challenge-running, .cf-browser-verification, [class*='cloudflare'], #challenge-form, .cf-turnstile, iframe[src*='challenges.cloudflare.com']"
    method: "detect"
    priority: 98

  # ── Email Verification ─────────────────────────────
  - name: "login_email_verification"
    category: "login"
    trigger:
      intent: "이메일 인증 요구 감지"
      site_pattern: "*"
    selector: ".email-verification, [class*='verify-email'], h1:has-text('Verify Your Email'), h1:has-text('이메일 인증'), .verify-email-prompt, .email-confirm"
    method: "detect"
    priority: 92
