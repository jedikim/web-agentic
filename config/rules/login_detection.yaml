# 로그인/인증 감지 규칙 — LLM-First v3 표준화
# HTML standard attributes + ARIA + text-based selectors

rules:
  # ── Login Form Detection ───────────────────────────
  - name: "login_form_detect"
    category: "login"
    trigger:
      intent: "로그인 폼 감지"
      site_pattern: "*"
    selector: "form[action*='login'], form[action*='signin'], form[id*='login'], input[autocomplete='username'] ~ input[type='password']"
    method: "detect"
    priority: 90

  - name: "login_username_field"
    category: "login"
    trigger:
      intent: "로그인 사용자명 입력"
      site_pattern: "*"
    selector: "input[name='username'], input[name='email'], input[name='user_id'], input[type='email'][autocomplete='username'], input[name='login'], input[autocomplete='username']"
    method: "type"
    priority: 88

  - name: "login_password_field"
    category: "login"
    trigger:
      intent: "로그인 비밀번호 입력"
      site_pattern: "*"
    selector: "input[type='password'], input[name='password'], input[autocomplete='current-password']"
    method: "type"
    priority: 88

  # ── 2FA Prompt ─────────────────────────────────────
  - name: "login_2fa_prompt"
    category: "login"
    trigger:
      intent: "2단계 인증 감지"
      site_pattern: "*"
    selector: "input[name='otp'], input[name='totp'], input[name='verification_code'], input[autocomplete='one-time-code']"
    method: "detect"
    priority: 95

  # ── OAuth Popup (brand names are OK — they're identifiers, not DOM classes) ──
  - name: "login_oauth_popup"
    category: "login"
    trigger:
      intent: "OAuth 로그인 팝업 감지"
      site_pattern: "*"
    selector: "button:has-text('Google'), button:has-text('Facebook'), button:has-text('Kakao'), button:has-text('Naver'), button:has-text('Apple'), [data-provider]"
    method: "detect"
    priority: 85

  # ── Password Expired ───────────────────────────────
  - name: "login_password_expired"
    category: "login"
    trigger:
      intent: "비밀번호 만료 감지"
      site_pattern: "*"
    selector: "h1:has-text('Password Expired'), h1:has-text('비밀번호 변경'), h2:has-text('Password Expired'), h2:has-text('비밀번호 변경')"
    method: "detect"
    priority: 93

  # ── Account Locked ─────────────────────────────────
  - name: "login_account_locked"
    category: "login"
    trigger:
      intent: "계정 잠금 감지"
      site_pattern: "*"
    selector: "h1:has-text('Account Locked'), h1:has-text('계정이 잠겼습니다'), h2:has-text('Account Locked')"
    method: "detect"
    priority: 94

  # ── CAPTCHA Detection (generic — no vendor selectors) ──
  - name: "login_captcha_generic"
    category: "login"
    trigger:
      intent: "캡챠 감지"
      site_pattern: "*"
    selector: "[class*='captcha' i], [id*='captcha' i], [data-sitekey]"
    method: "detect"
    priority: 96

  # ── Email Verification ─────────────────────────────
  - name: "login_email_verification"
    category: "login"
    trigger:
      intent: "이메일 인증 요구 감지"
      site_pattern: "*"
    selector: "h1:has-text('Verify Your Email'), h1:has-text('이메일 인증'), h2:has-text('Verify Your Email')"
    method: "detect"
    priority: 92
