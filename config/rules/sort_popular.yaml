# 인기순 정렬 규칙 예시 — LLM-First v3
# filter_sort.yaml의 sort_popularity 규칙으로 통합됨. 이 파일은 참고용.
rule:
  name: "sort_by_popular"
  trigger:
    context: "상품 목록 페이지"
    intent: "인기순 정렬"

  synonyms_ref: "sort_synonyms.popular"

  strategy:
    - step: "find_sort_ui"
      method: "LLM이 DOM 후보에서 선택"
      fallback: "escalate_to_vision"

    - step: "click_sort"
      method: "X.click(selected_eid)"

    - step: "verify"
      checks:
        - type: "element_selected"
          selector: "selected_eid"
        - type: "url_param_exists"
          key: "sort"
        - type: "page_loaded"
      on_fail: "escalate_to_vision"

  guardrail:
    max_retries: 3
    timeout_ms: 10000
