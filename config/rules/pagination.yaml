# 페이지네이션 처리 규칙 — LLM-First v3 표준화
# Text/ARIA-based selectors only — no class-name dependencies

rules:
  # ── Next Page Button ───────────────────────────────
  - name: "pagination_next_page"
    category: "pagination"
    trigger:
      intent: "다음 페이지"
      site_pattern: "*"
    selector: "a[rel='next'], button[aria-label='Next'], a:has-text('Next'), a:has-text('다음'), button:has-text('Next'), button:has-text('다음')"
    method: "click"
    priority: 85

  # ── Previous Page Button ───────────────────────────
  - name: "pagination_prev_page"
    category: "pagination"
    trigger:
      intent: "이전 페이지"
      site_pattern: "*"
    selector: "a[rel='prev'], button[aria-label='Previous'], a:has-text('Prev'), a:has-text('이전'), button:has-text('Previous'), button:has-text('이전')"
    method: "click"
    priority: 85

  # ── Load More Button ───────────────────────────────
  - name: "pagination_load_more"
    category: "pagination"
    trigger:
      intent: "더보기"
      site_pattern: "*"
    selector: "button:has-text('Load More'), button:has-text('더보기'), button:has-text('더 보기'), a:has-text('Load More'), a:has-text('더보기'), [data-testid='load-more']"
    method: "click"
    priority: 84

  # ── See More Link ──────────────────────────────────
  - name: "pagination_see_more"
    category: "pagination"
    trigger:
      intent: "더 보기 링크"
      site_pattern: "*"
    selector: "a:has-text('See More'), a:has-text('더 보기'), a:has-text('View More'), a:has-text('Show More')"
    method: "click"
    priority: 83

  # ── Infinite Scroll Trigger ────────────────────────
  - name: "pagination_infinite_scroll"
    category: "pagination"
    trigger:
      intent: "무한 스크롤"
      site_pattern: "*"
    selector: "[data-infinite-scroll], [aria-label='Loading more']"
    method: "scroll"
    arguments: ["down", "1000"]
    priority: 82

  # ── Page Number Links ──────────────────────────────
  - name: "pagination_page_number"
    category: "pagination"
    trigger:
      intent: "페이지 번호 클릭"
      site_pattern: "*"
    selector: "nav[aria-label*='pagination' i] a, nav[aria-label*='페이지'] a, [role='navigation'] a[data-page]"
    method: "click"
    priority: 80

  # ── Arrow Navigation (Right/Next) ──────────────────
  - name: "pagination_arrow_next"
    category: "pagination"
    trigger:
      intent: "다음 화살표 클릭"
      site_pattern: "*"
    selector: "[aria-label='Next page'], [aria-label='Next'], button[aria-label='Next']"
    method: "click"
    priority: 81

  # ── Arrow Navigation (Left/Prev) ──────────────────
  - name: "pagination_arrow_prev"
    category: "pagination"
    trigger:
      intent: "이전 화살표 클릭"
      site_pattern: "*"
    selector: "[aria-label='Previous page'], [aria-label='Previous'], button[aria-label='Previous']"
    method: "click"
    priority: 81

  # ── Korean "더보기" Variants ────────────────────────
  - name: "pagination_korean_more"
    category: "pagination"
    trigger:
      intent: "한국어 더보기"
      site_pattern: "*"
    selector: "button:has-text('더 보기'), a:has-text('더 보기'), button:has-text('더보기'), a:has-text('더보기'), button:has-text('전체보기'), a:has-text('전체보기')"
    method: "click"
    priority: 84

  # ── First/Last Page ────────────────────────────────
  - name: "pagination_first_page"
    category: "pagination"
    trigger:
      intent: "첫 페이지"
      site_pattern: "*"
    selector: "a:has-text('First'), a:has-text('처음'), [aria-label='First page']"
    method: "click"
    priority: 79

  - name: "pagination_last_page"
    category: "pagination"
    trigger:
      intent: "마지막 페이지"
      site_pattern: "*"
    selector: "a:has-text('Last'), a:has-text('마지막'), [aria-label='Last page']"
    method: "click"
    priority: 79

  # ── Items Per Page Selector ────────────────────────
  - name: "pagination_items_per_page"
    category: "pagination"
    trigger:
      intent: "페이지당 항목 수 변경"
      site_pattern: "*"
    selector: "select[name*='per_page'], select[name*='pageSize'], [data-testid='page-size'], select[name*='size']"
    method: "select"
    priority: 78
