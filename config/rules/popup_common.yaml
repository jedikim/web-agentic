# 팝업/모달 공통 처리 규칙 — LLM-First v3 표준화
# Text/ARIA-based selectors only — no class-name dependencies

rules:
  # ── Cookie Consent ──────────────────────────────────
  - name: "popup_cookie_accept"
    category: "popup"
    trigger:
      intent: "쿠키 동의 수락"
      site_pattern: "*"
    selector: "button:has-text('Accept'), button:has-text('동의'), button:has-text('Agree'), button:has-text('Allow'), [role='button']:has-text('Accept All'), [role='button']:has-text('모두 동의'), [data-testid*='cookie-accept']"
    method: "click"
    priority: 90

  - name: "popup_cookie_close"
    category: "popup"
    trigger:
      intent: "쿠키 배너 닫기"
      site_pattern: "*"
    selector: "[aria-label='Close cookie banner'], button:has-text('Close'), button:has-text('닫기'), [aria-label='Dismiss']"
    method: "click"
    priority: 88

  - name: "popup_cookie_gdpr"
    category: "popup"
    trigger:
      intent: "GDPR 동의"
      site_pattern: "*"
    selector: "button:has-text('Accept All'), button:has-text('모두 수락'), [role='button']:has-text('Consent'), [data-gdpr='accept']"
    method: "click"
    priority: 89

  # ── Newsletter / Subscription ──────────────────────
  - name: "popup_newsletter_close"
    category: "popup"
    trigger:
      intent: "뉴스레터 팝업 닫기"
      site_pattern: "*"
    selector: "[role='dialog'] button[aria-label='Close'], [role='dialog'] button:has-text('닫기'), [role='dialog'] button:has-text('Close'), [data-testid='newsletter-close']"
    method: "click"
    priority: 85

  - name: "popup_newsletter_dismiss"
    category: "popup"
    trigger:
      intent: "뉴스레터 거절"
      site_pattern: "*"
    selector: "[role='dialog'] button:has-text('No thanks'), [role='dialog'] button:has-text('나중에'), [role='dialog'] button:has-text('Skip')"
    method: "click"
    priority: 84

  # ── Age Verification ───────────────────────────────
  - name: "popup_age_verify"
    category: "popup"
    trigger:
      intent: "나이 확인 팝업 처리"
      site_pattern: "*"
    selector: "button:has-text('Yes'), button:has-text('예'), button:has-text('Enter'), button:has-text('확인'), [data-testid='age-gate-yes']"
    method: "click"
    priority: 87

  # ── Notification Permission ────────────────────────
  - name: "popup_notification_dismiss"
    category: "popup"
    trigger:
      intent: "알림 권한 요청 닫기"
      site_pattern: "*"
    selector: "button:has-text('No thanks'), button:has-text('나중에'), button:has-text('Deny'), button:has-text('Block'), [data-testid='notification-dismiss']"
    method: "click"
    priority: 86

  # ── App Download Prompt ────────────────────────────
  - name: "popup_app_download_close"
    category: "popup"
    trigger:
      intent: "앱 다운로드 배너 닫기"
      site_pattern: "*"
    selector: "[aria-label='Close'], button:has-text('닫기'), button:has-text('Close'), button:has-text('Dismiss'), [data-testid='app-banner-close']"
    method: "click"
    priority: 83

  # ── Survey / Feedback ──────────────────────────────
  - name: "popup_survey_close"
    category: "popup"
    trigger:
      intent: "설문 팝업 닫기"
      site_pattern: "*"
    selector: "[role='dialog'] button[aria-label='Close'], [role='dialog'] button:has-text('닫기'), [role='dialog'] button:has-text('Close'), [data-testid='survey-dismiss']"
    method: "click"
    priority: 82

  # ── Ad Overlay ─────────────────────────────────────
  - name: "popup_ad_overlay_close"
    category: "popup"
    trigger:
      intent: "광고 오버레이 닫기"
      site_pattern: "*"
    selector: "button[aria-label='Close ad'], button[aria-label='Close'], button:has-text('Skip'), button:has-text('건너뛰기'), [data-testid='ad-close']"
    method: "click"
    priority: 81

  # ── Chat Widget ────────────────────────────────────
  - name: "popup_chat_widget_close"
    category: "popup"
    trigger:
      intent: "채팅 위젯 닫기"
      site_pattern: "*"
    selector: "[aria-label='Close chat'], [aria-label='Minimize chat'], button[aria-label='Close'], [data-testid='chat-close']"
    method: "click"
    priority: 75

  # ── Login Prompt (close, not login) ────────────────
  - name: "popup_login_prompt_close"
    category: "popup"
    trigger:
      intent: "로그인 권유 팝업 닫기"
      site_pattern: "*"
    selector: "[role='dialog'] button[aria-label='Close'], [role='dialog'] button:has-text('닫기'), [role='dialog'] button:has-text('Close'), [data-testid='login-modal-close']"
    method: "click"
    priority: 80

  # ── Generic Modal Close ────────────────────────────
  - name: "popup_generic_modal_close"
    category: "popup"
    trigger:
      intent: "일반 모달 닫기"
      site_pattern: "*"
    selector: "[role='dialog'] button[aria-label='Close'], [data-dismiss='modal'], [aria-label='Close'], button:has-text('닫기'), button:has-text('Close')"
    method: "click"
    priority: 70

  # ── Welcome / Onboarding ───────────────────────────
  - name: "popup_welcome_dismiss"
    category: "popup"
    trigger:
      intent: "환영 팝업 닫기"
      site_pattern: "*"
    selector: "[role='dialog'] button:has-text('Skip'), [role='dialog'] button:has-text('건너뛰기'), [role='dialog'] button[aria-label='Close'], [data-testid='welcome-dismiss']"
    method: "click"
    priority: 78

  # ── Promotion / Event ──────────────────────────────
  - name: "popup_promotion_close"
    category: "popup"
    trigger:
      intent: "프로모션 팝업 닫기"
      site_pattern: "*"
    selector: "[role='dialog'] button[aria-label='Close'], [role='dialog'] button:has-text('닫기'), [role='dialog'] button:has-text('Close'), [data-testid='promo-close']"
    method: "click"
    priority: 79

  # ── Location Permission ────────────────────────────
  - name: "popup_location_dismiss"
    category: "popup"
    trigger:
      intent: "위치 정보 요청 닫기"
      site_pattern: "*"
    selector: "button:has-text('Deny'), button:has-text('거부'), button:has-text('Not now'), button:has-text('나중에'), [data-testid='location-dismiss']"
    method: "click"
    priority: 77
